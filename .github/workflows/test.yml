name: Test Installer

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install black ruff
      - run: bash format.sh --check

  test:
    runs-on: ubuntu-latest
    env:
      CONTAINER: kiro-gw-test
      IMAGE: kiro-gateway-installer-test
      TEST_USER: testuser
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build systemd test image
        run: docker build -f tests/Dockerfile.systemd -t $IMAGE .

      - name: Start systemd container
        run: |
          docker run -d \
            --name $CONTAINER \
            --privileged \
            --cgroupns=host \
            -v /sys/fs/cgroup:/sys/fs/cgroup:rw \
            $IMAGE

      - name: Wait for systemd
        run: |
          for i in $(seq 1 30); do
            state=$(docker exec $CONTAINER systemctl is-system-running 2>/dev/null || true)
            echo "Attempt $i: $state"
            if [ "$state" = "running" ] || [ "$state" = "degraded" ]; then
              break
            fi
            sleep 1
          done

      - name: Setup test user
        run: |
          docker exec $CONTAINER loginctl enable-linger $TEST_USER
          UID_VAL=$(docker exec $CONTAINER id -u $TEST_USER)
          echo "Test user UID: $UID_VAL"
          # Wait for user systemd
          for i in $(seq 1 15); do
            state=$(docker exec --user $TEST_USER \
              -e XDG_RUNTIME_DIR=/run/user/$UID_VAL \
              -e DBUS_SESSION_BUS_ADDRESS=unix:path=/run/user/$UID_VAL/bus \
              $CONTAINER systemctl --user is-system-running 2>/dev/null || true)
            echo "User systemd attempt $i: $state"
            if [ "$state" = "running" ] || [ "$state" = "degraded" ]; then
              break
            fi
            sleep 1
          done

      - name: Run tests
        run: |
          UID_VAL=$(docker exec $CONTAINER id -u $TEST_USER)
          docker exec --user $TEST_USER \
            -e XDG_RUNTIME_DIR=/run/user/$UID_VAL \
            -e DBUS_SESSION_BUS_ADDRESS=unix:path=/run/user/$UID_VAL/bus \
            $CONTAINER \
            python3 -m pytest /workspace/tests/test_install.py -v --tb=short

      - name: Show logs on failure
        if: failure()
        run: |
          UID_VAL=$(docker exec $CONTAINER id -u $TEST_USER)
          echo "=== user journal ==="
          docker exec --user $TEST_USER \
            -e XDG_RUNTIME_DIR=/run/user/$UID_VAL \
            -e DBUS_SESSION_BUS_ADDRESS=unix:path=/run/user/$UID_VAL/bus \
            $CONTAINER journalctl --user-unit kiro-gateway --no-pager -n 50 || true
          echo "=== service file ==="
          docker exec --user $TEST_USER $CONTAINER \
            cat /home/$TEST_USER/.config/systemd/user/kiro-gateway.service || true
          echo "=== .env ==="
          docker exec --user $TEST_USER $CONTAINER \
            cat /home/$TEST_USER/.local/share/kiro-gateway/.env || true

      - name: Cleanup
        if: always()
        run: docker rm -f $CONTAINER
